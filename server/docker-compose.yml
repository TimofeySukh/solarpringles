services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: solar-mosquitto
    restart: unless-stopped
    environment:
      TZ: Europe/Copenhagen
    ports:
      - "${SOLAR_MQTT_HOST_PORT:-1884}:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - solar-net

  influxdb:
    image: influxdb:2.7
    container_name: solar-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SOLAR_INFLUXDB_HOST_PORT:-18086}:8086"
    environment:
      TZ: Europe/Copenhagen
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - solar-net

  worker:
    build:
      context: ./worker
    container_name: solar-worker
    restart: unless-stopped
    depends_on:
      - mosquitto
      - influxdb
    environment:
      TZ: Europe/Copenhagen
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: ${MQTT_TOPIC}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_INIT_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_INIT_BUCKET}
      INFLUXDB_MEASUREMENT: ${INFLUXDB_MEASUREMENT}
      INFLUXDB_SENSOR_ID: ${INFLUXDB_SENSOR_ID}
      SOLAR_TIMEZONE: Europe/Copenhagen
    networks:
      - solar-net

  fake_edge:
    build:
      context: ./fake_edge
    container_name: solar-fake-edge
    restart: unless-stopped
    profiles: ["fake"]
    depends_on:
      - mosquitto
    environment:
      TZ: Europe/Copenhagen
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: ${MQTT_TOPIC}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      FAKE_SENSOR_ID: ${INFLUXDB_SENSOR_ID}
      FAKE_VOLTAGE: ${FAKE_VOLTAGE:-0.476}
      FAKE_PUBLISH_INTERVAL_SECONDS: ${FAKE_PUBLISH_INTERVAL_SECONDS:-1.0}
      FAKE_SAMPLE_COUNT: ${FAKE_SAMPLE_COUNT:-5}
    networks:
      - solar-net

  backend:
    build:
      context: ./backend
    container_name: solar-backend
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      TZ: Europe/Copenhagen
      API_TITLE: Sollar Panel API
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_INIT_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_INIT_BUCKET}
      INFLUXDB_MEASUREMENT: ${INFLUXDB_MEASUREMENT}
      INFLUXDB_SENSOR_ID: ${INFLUXDB_SENSOR_ID}
      SOLAR_TIMEZONE: Europe/Copenhagen
      MODEL_REGISTRY_DIR: /models
    volumes:
      - ml-models:/models:ro
    ports:
      - "127.0.0.1:${SOLAR_BACKEND_HOST_PORT:-18000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - solar-net

  ml_engine:
    build:
      context: ./ml_engine
    container_name: solar-ml-engine
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      TZ: Europe/Copenhagen
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_INIT_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_INIT_BUCKET}
      INFLUXDB_MEASUREMENT: ${INFLUXDB_MEASUREMENT}
      INFLUXDB_SENSOR_ID: ${INFLUXDB_SENSOR_ID}
      SOLAR_TIMEZONE: Europe/Copenhagen
      MODEL_REGISTRY_DIR: /models
      ML_TRAIN_INTERVAL_MINUTES: 15
      ML_LOOKBACK_DAYS: 14
      ML_NIGHT_THRESHOLD: ${ML_NIGHT_THRESHOLD:-0.035}
      ML_DAY_THRESHOLD: ${ML_DAY_THRESHOLD:-0.24}
      ML_ANOMALY_STD_THRESHOLD: ${ML_ANOMALY_STD_THRESHOLD:-0.03}
      ML_ANOMALY_RANGE_THRESHOLD: ${ML_ANOMALY_RANGE_THRESHOLD:-0.08}
      ML_SUNRISE_DELTA_THRESHOLD: ${ML_SUNRISE_DELTA_THRESHOLD:-0.01}
      ML_SUNSET_DELTA_THRESHOLD: ${ML_SUNSET_DELTA_THRESHOLD:--0.01}
    volumes:
      - ml-models:/models
    networks:
      - solar-net

  frontend:
    build:
      context: ./frontend
    container_name: solar-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: Europe/Copenhagen
    ports:
      - "127.0.0.1:${SOLAR_FRONTEND_HOST_PORT:-13000}:3000"
    networks:
      - solar-net

networks:
  solar-net:
    name: solar-net

volumes:
  influxdb-data:
  ml-models:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solar Pringles Farm</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap");

      :root {
        color-scheme: dark;
        --bg: #05070a;
        --panel: rgba(8, 16, 24, 0.92);
        --line: rgba(88, 255, 169, 0.16);
        --text: #ebfff5;
        --muted: #86a99b;
        --voltage: #58ffa9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "JetBrains Mono", "Roboto Mono", monospace;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(88, 255, 169, 0.14), transparent 22%),
          radial-gradient(circle at left 20%, rgba(107, 216, 255, 0.1), transparent 20%),
          var(--bg);
      }

      .shell {
        width: min(980px, calc(100% - 24px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(7, 14, 22, 0.96), rgba(5, 10, 14, 0.94)),
          var(--panel);
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.52),
          inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        overflow: hidden;
      }

      .header {
        padding: 24px 24px 8px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.02;
        letter-spacing: -0.05em;
      }

      .content {
        padding: 0 24px 24px;
      }

      .photo {
        width: 100%;
        display: block;
        border-radius: 24px;
        border: 1px solid rgba(88, 255, 169, 0.18);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
        object-fit: cover;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        margin-top: 20px;
        border-radius: 999px;
        border: 1px solid rgba(88, 255, 169, 0.28);
        color: var(--text);
        text-decoration: none;
        background:
          linear-gradient(180deg, rgba(88, 255, 169, 0.16), rgba(88, 255, 169, 0.06)),
          rgba(6, 12, 18, 0.92);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="header">
          <h1>Yea so i've made this in pringles</h1>
        </header>

        <section class="content">
          <img
            class="photo"
            src="/assets/pringles-farm.jpg"
            alt="The Pringles can solar panel node on a windowsill"
          />
          <a class="back-link" href="/">Back to dashboard</a>
        </section>
      </section>
    </main>
  </body>
</html>
